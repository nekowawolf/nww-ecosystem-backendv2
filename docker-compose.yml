version: "3.8"

services:
  api:
    build:
      context: .
      network: host
    container_name: goapi
    network_mode: "host"
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/os-release:/etc/host-os-release:ro
      - /etc/hostname:/etc/host-hostname:ro

  redis:
    image: redis:7-alpine
    restart: always
    network_mode: "host"

  nginx:
    image: nginx:alpine
    restart: always
    network_mode: "host"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro