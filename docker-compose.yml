version: "3.8"

services:
  api:
    build:
      context: .
      network: host 
    container_name: goapi
    network_mode: "host" 
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/os-release:/etc/host-os-release:ro
      - /etc/hostname:/etc/host-hostname:ro